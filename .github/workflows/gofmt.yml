name: Go-fmt
on:
  push:
    branches:
    - master
    - release/*
  pull_request:
    branches:
    - master

permissions:
  contents: read

jobs:
  gofmt:
    name: Go fmt project
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Check gofmt
        run: test -z "$(gofmt -l .)"
