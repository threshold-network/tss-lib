name: Go Test
on:
  push:
    branches:
    - master
    - release/*
  pull_request:
    branches:
    - master

permissions:
  contents: read

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'
        cache: true

    - name: Run Tests
      run: make test_unit
